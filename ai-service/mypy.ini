[mypy]
python_version = 3.12
strict = True
warn_unused_ignores = True
warn_return_any = True
plugins = pydantic.mypy
exclude = (?x)(^build/|^dist/|^\.venv/|^tests/)

[mypy-jose.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-respx.*]
ignore_missing_imports = True

[mypy-sse_starlette.*]
ignore_missing_imports = True
