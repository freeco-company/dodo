<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringX" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#F5C8C8"/><stop offset="55%" stop-color="#C84848"/><stop offset="100%" stop-color="#7A2020"/>
    </linearGradient>
    <radialGradient id="bgX" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FFF8F2"/><stop offset="60%" stop-color="#F5E0E0"/><stop offset="100%" stop-color="#C84848" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="treeX" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A8D890"/><stop offset="100%" stop-color="#3A7028"/></linearGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#7A2020" opacity="0.18"/>
  <circle cx="48" cy="48" r="42" fill="url(#bgX)" stroke="url(#ringX)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
  <!-- 聖誕樹 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1; 0 0" dur="5.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <polygon points="48,28 38,46 56,46" fill="url(#treeX)" stroke="#3A7028" stroke-width="0.8"/>
    <polygon points="48,38 34,56 60,56" fill="url(#treeX)" stroke="#3A7028" stroke-width="0.8"/>
    <polygon points="48,48 30,68 64,68" fill="url(#treeX)" stroke="#3A7028" stroke-width="0.8"/>
    <rect x="44" y="68" width="8" height="6" fill="#7A4828" stroke="#3A2010" stroke-width="0.6"/>
    <!-- ornaments -->
    <circle cx="44" cy="44" r="1.4" fill="#FFD060"/>
    <circle cx="52" cy="44" r="1.4" fill="#C84848"/>
    <circle cx="40" cy="54" r="1.4" fill="#C84848"/>
    <circle cx="48" cy="54" r="1.4" fill="#FFD060"/>
    <circle cx="56" cy="54" r="1.4" fill="#FFD060"/>
    <circle cx="36" cy="64" r="1.4" fill="#FFD060"/>
    <circle cx="48" cy="64" r="1.4" fill="#C84848"/>
    <circle cx="58" cy="64" r="1.4" fill="#C84848"/>
    <!-- top star -->
    <polygon points="48,22 49.5,26 53.5,26 50.5,28.5 51.5,32.5 48,30 44.5,32.5 45.5,28.5 42.5,26 46.5,26"
             fill="#FFD060" stroke="#A06030" stroke-width="0.5">
      <animate attributeName="opacity" values="1;0.65;1" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- snow -->
  <circle cx="22" cy="34" r="1.4" fill="#FFF8F2"><animate attributeName="opacity" values="0.95;0.5;0.95" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="74" cy="36" r="1.2" fill="#FFF8F2"><animate attributeName="opacity" values="0.85;0.45;0.85" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="76" cy="68" r="1" fill="#FFF8F2"><animate attributeName="opacity" values="0.9;0.45;0.9" dur="3.8s" repeatCount="indefinite"/></circle>
</svg>
