<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringNY" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#FFE0E0"/><stop offset="55%" stop-color="#E04848"/><stop offset="100%" stop-color="#8A1818"/>
    </linearGradient>
    <radialGradient id="bgNY" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FFF8F2"/><stop offset="60%" stop-color="#FFE0E0"/><stop offset="100%" stop-color="#E04848" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#8A1818" opacity="0.18"/>
  <circle cx="48" cy="48" r="42" fill="url(#bgNY)" stroke="url(#ringNY)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
  <!-- 紅包 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1.2; 0 0" dur="5.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <rect x="32" y="32" width="32" height="38" rx="3" ry="3" fill="#E04848" stroke="#7A1818" stroke-width="1.4"/>
    <rect x="32" y="32" width="32" height="10" fill="#C03030" stroke="#7A1818" stroke-width="1.0"/>
    <text x="48" y="58" text-anchor="middle" font-size="14" font-weight="900" fill="#FFD060" font-family="serif">福</text>
    <!-- gold trim -->
    <line x1="32" y1="42" x2="64" y2="42" stroke="#FFD060" stroke-width="1.2"/>
  </g>
  <!-- 鞭炮火花 sparkles -->
  <circle cx="22" cy="32" r="1.4" fill="#FFD060"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="74" cy="34" r="1.2" fill="#FFD060"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="3.0s" repeatCount="indefinite"/></circle>
  <circle cx="76" cy="68" r="1" fill="#FFD060"><animate attributeName="opacity" values="0.95;0.5;0.95" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="22" cy="70" r="1.1" fill="#FFD060"><animate attributeName="opacity" values="0.85;0.4;0.85" dur="2.9s" repeatCount="indefinite"/></circle>
</svg>
