<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringS" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#FFE6F0"/><stop offset="55%" stop-color="#F5B5C5"/><stop offset="100%" stop-color="#C870A0"/>
    </linearGradient>
    <radialGradient id="bgS" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FFF8F2"/><stop offset="60%" stop-color="#FFE6F0"/><stop offset="100%" stop-color="#F5B5C5" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#C870A0" opacity="0.18"/>
  <circle cx="48" cy="48" r="42" fill="url(#bgS)" stroke="url(#ringS)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
  <!-- 五瓣櫻花 (gentle rotate) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-2 48 48; 2 48 48; -2 48 48" dur="8.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <g transform="translate(48 48)">
      <g><ellipse cx="0" cy="-13" rx="6" ry="9" fill="#FFC9DC" stroke="#D88BAF" stroke-width="0.8"/></g>
      <g transform="rotate(72)"><ellipse cx="0" cy="-13" rx="6" ry="9" fill="#FFC9DC" stroke="#D88BAF" stroke-width="0.8"/></g>
      <g transform="rotate(144)"><ellipse cx="0" cy="-13" rx="6" ry="9" fill="#FFC9DC" stroke="#D88BAF" stroke-width="0.8"/></g>
      <g transform="rotate(216)"><ellipse cx="0" cy="-13" rx="6" ry="9" fill="#FFC9DC" stroke="#D88BAF" stroke-width="0.8"/></g>
      <g transform="rotate(288)"><ellipse cx="0" cy="-13" rx="6" ry="9" fill="#FFC9DC" stroke="#D88BAF" stroke-width="0.8"/></g>
      <circle cx="0" cy="0" r="3.5" fill="#FFEC9C" stroke="#D8A030" stroke-width="0.6"/>
    </g>
  </g>
  <!-- floating petals -->
  <circle cx="22" cy="32" r="1.4" fill="#FFC9DC"><animate attributeName="opacity" values="0.9;0.5;0.9" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="74" cy="36" r="1.2" fill="#FFC9DC"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="5.4s" repeatCount="indefinite"/></circle>
  <circle cx="68" cy="76" r="1" fill="#FFC9DC"><animate attributeName="opacity" values="0.85;0.45;0.85" dur="3.8s" repeatCount="indefinite"/></circle>
</svg>
