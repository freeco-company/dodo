  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
  <!-- 雪花 (gentle rotate) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 48 48; 30 48 48; 0 48 48" dur="14.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <g transform="translate(48 48)" stroke="#5A7090" stroke-width="2.2" stroke-linecap="round" fill="none">
      <line x1="0" y1="-18" x2="0" y2="18"/>
      <line x1="-15.6" y1="-9" x2="15.6" y2="9"/>
      <line x1="-15.6" y1="9" x2="15.6" y2="-9"/>
      <!-- branchlets -->
      <path d="M 0 -18 L 3 -14 M 0 -18 L -3 -14"/>
      <path d="M 0 18 L 3 14 M 0 18 L -3 14"/>
      <path d="M 15.6 9 L 11 11 M 15.6 9 L 13 5"/>
      <path d="M -15.6 -9 L -11 -11 M -15.6 -9 L -13 -5"/>
      <path d="M 15.6 -9 L 11 -11 M 15.6 -9 L 13 -5"/>
      <path d="M -15.6 9 L -11 11 M -15.6 9 L -13 5"/>
      <circle cx="0" cy="0" r="2.5" fill="#E8F0FA" stroke="#5A7090" stroke-width="0.8"/>
    </g>
  </g>
  <!-- snow -->
  <circle cx="22" cy="32" r="1.4" fill="#FFF8F2"><animate attributeName="opacity" values="0.95;0.55;0.95" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="74" cy="36" r="1.2" fill="#FFF8F2"><animate attributeName="opacity" values="0.85;0.45;0.85" dur="4.2s" repeatCount="indefinite"/></circle>
