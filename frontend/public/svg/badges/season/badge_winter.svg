<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringW" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#E8F0FA"/><stop offset="55%" stop-color="#B8C8DC"/><stop offset="100%" stop-color="#5A7090"/>
    </linearGradient>
    <radialGradient id="bgW" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FAFCFF"/><stop offset="60%" stop-color="#E8F0FA"/><stop offset="100%" stop-color="#B8C8DC" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#5A7090" opacity="0.18"/>
