<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringA" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#FFD8B0"/><stop offset="55%" stop-color="#E89060"/><stop offset="100%" stop-color="#A04820"/>
    </linearGradient>
    <radialGradient id="bgA" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FFF8F2"/><stop offset="60%" stop-color="#FFD8B0"/><stop offset="100%" stop-color="#E89060" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFB870"/><stop offset="100%" stop-color="#C04820"/></linearGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#A04820" opacity="0.18"/>
  <circle cx="48" cy="48" r="42" fill="url(#bgA)" stroke="url(#ringA)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
