    <animateTransform attributeName="transform" type="rotate" values="-3 48 48; 3 48 48; -3 48 48" dur="7.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <g transform="translate(48 48)">
      <path d="M 0 -22 L 6 -10 L 14 -8 L 8 0 L 14 6 L 6 4 L 8 14 L 0 8 L -8 14 L -6 4 L -14 6 L -8 0 L -14 -8 L -6 -10 Z"
            fill="url(#leafA)" stroke="#7A2810" stroke-width="1.0" stroke-linejoin="round"/>
      <path d="M 0 8 L 0 -16" stroke="#7A2810" stroke-width="0.8" fill="none"/>
      <path d="M -6 -8 L 0 -4 L 6 -8" stroke="#7A2810" stroke-width="0.6" fill="none"/>
    </g>
  </g>
  <!-- 飄落小葉 -->
  <path d="M 22 32 q 2 2 0 4 q -2 -2 0 -4" fill="#FFB870" opacity="0.85"><animate attributeName="opacity" values="0.85;0.4;0.85" dur="4.5s" repeatCount="indefinite"/></path>
  <path d="M 74 30 q 2 2 0 4 q -2 -2 0 -4" fill="#E89060" opacity="0.8"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="5.0s" repeatCount="indefinite"/></path>
  <path d="M 70 76 q 2 2 0 4 q -2 -2 0 -4" fill="#FFB870" opacity="0.75"><animate attributeName="opacity" values="0.75;0.35;0.75" dur="4.0s" repeatCount="indefinite"/></path>
  <circle cx="28" cy="74" r="1" fill="#FFF8F2"><animate attributeName="opacity" values="0.95;0.55;0.95" dur="3.6s" repeatCount="indefinite"/></circle>
