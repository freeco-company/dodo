<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="ringMA" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#FFE8C0"/><stop offset="55%" stop-color="#E8B870"/><stop offset="100%" stop-color="#A06030"/>
    </linearGradient>
    <radialGradient id="bgMA" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#FFF8F2"/><stop offset="60%" stop-color="#FFE8C0"/><stop offset="100%" stop-color="#E8B870" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <ellipse cx="48" cy="92" rx="26" ry="2.5" fill="#A06030" opacity="0.18"/>
  <circle cx="48" cy="48" r="42" fill="url(#bgMA)" stroke="url(#ringMA)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.55"/>
  <!-- 月餅（圓 + 花紋） -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1.5; 0 0" dur="6.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <circle cx="48" cy="50" r="20" fill="#E8B870" stroke="#7A4828" stroke-width="1.5"/>
    <circle cx="48" cy="50" r="16" fill="none" stroke="#7A4828" stroke-width="0.8" opacity="0.6"/>
    <text x="48" y="56" text-anchor="middle" font-size="14" font-weight="900" fill="#7A4828" font-family="serif">月</text>
  </g>
  <!-- 滿月光暈 -->
  <circle cx="48" cy="50" r="24" fill="none" stroke="#FFEC9C" stroke-width="1.0" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <!-- stars -->
  <circle cx="22" cy="30" r="1.4" fill="#FFF8F2"><animate attributeName="opacity" values="0.95;0.5;0.95" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="74" cy="32" r="1.2" fill="#FFF8F2"><animate attributeName="opacity" values="0.9;0.45;0.9" dur="4.2s" repeatCount="indefinite"/></circle>
</svg>
