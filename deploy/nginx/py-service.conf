# py-service (FastAPI / uvicorn :8003) — Pandora group conversion / lifecycle
#
# Default: internal only (loopback). Mothership + dodo-backend reach it via
# 127.0.0.1:8003 with INTERNAL_SHARED_SECRET.
#
# OPTIONAL public vhost: conv.js-store.com.tw — enable only if a public
# admin dashboard or external webhook receiver is needed. Until then, leave
# this file disabled (do NOT symlink into sites-enabled/).
#
# Place at: /etc/nginx/sites-available/py-service.conf

