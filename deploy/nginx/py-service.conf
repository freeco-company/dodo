# --- DEFAULT: localhost-only debug listener --------------------------------
server {
    listen 127.0.0.1:8083;
    server_name _;

    access_log /var/log/nginx/py-service.access.log;
    error_log  /var/log/nginx/py-service.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}
