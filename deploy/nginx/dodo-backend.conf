# Dodo Backend (Laravel) — dodo.js-store.com.tw
# Reverse proxy via PHP-FPM unix socket. Serves /api/*, /admin/*, /storage/*.
# Frontend (static) lives on a separate subdomain `app.dodo.js-store.com.tw`
# (see dodo-frontend.conf) so this vhost is purely API + Filament admin.
#
# Place at: /etc/nginx/sites-available/dodo-backend.conf
# Enable:   ln -sf ../sites-available/dodo-backend.conf /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx

# --- HTTP -> HTTPS redirect (also leaves /.well-known reachable for certbot) ---
server {
    listen 80;
    listen [::]:80;
    server_name dodo.js-store.com.tw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS vhost ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dodo.js-store.com.tw;

    root /var/www/dodo/backend/public;
    index index.php;

    # Let's Encrypt (certbot) — generated by:
    #   certbot certonly --webroot -w /var/www/certbot -d dodo.js-store.com.tw
    ssl_certificate     /etc/letsencrypt/live/dodo.js-store.com.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dodo.js-store.com.tw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security headers (minimal viable set) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP is conservative; Filament admin relies on inline scripts/styles -> 'unsafe-inline' kept.
    # TODO: tighten CSP after Filament asset audit.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://app.dodo.js-store.com.tw; frame-ancestors 'self';" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    # brotli (only if nginx-extras / libnginx-mod-brotli installed):
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 20M;        # food photo uploads
    keepalive_timeout 65;

    access_log /var/log/nginx/dodo-backend.access.log;
    error_log  /var/log/nginx/dodo-backend.error.log warn;

    # Laravel storage public link (php artisan storage:link)
    location ^~ /storage/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP -> FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Deny access to dotfiles / sensitive
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~* \.(env|sqlite|sql|log|md|lock|json)$ {
        deny all;
    }
}
