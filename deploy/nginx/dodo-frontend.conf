# Dodo Frontend (Capacitor web bundle) — app.dodo.js-store.com.tw
# Pure static serve. No PHP. Frontend talks to dodo-backend via window.DODO_API_BASE.
#
# Place at: /etc/nginx/sites-available/dodo-frontend.conf
# Enable:   ln -sf ../sites-available/dodo-frontend.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name app.dodo.js-store.com.tw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.dodo.js-store.com.tw;

    root /var/www/dodo/frontend/public;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/app.dodo.js-store.com.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.dodo.js-store.com.tw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Frontend needs to talk to backend API + ai-service callback origins.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://dodo.js-store.com.tw https://*.posthog.com; media-src 'self' blob:; frame-ancestors 'self';" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/wasm;

    access_log /var/log/nginx/dodo-frontend.access.log;
    error_log  /var/log/nginx/dodo-frontend.error.log warn;

    # Long-cache hashed assets
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback (Capacitor web bundle is a SPA)
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html so deploys take effect immediately.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ /\. {
        deny all;
    }
}
