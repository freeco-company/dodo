# Dodo AI Service (FastAPI / uvicorn :8002)
#
# Default: NOT exposed to the public internet.
# dodo-backend talks to ai-service over loopback (http://127.0.0.1:8002),
# authenticated via X-Internal-Secret. Direct external access is unnecessary.
#
# This file ships a (commented-out) public sub-path proxy as an OPTIONAL
# escape hatch for webhook callbacks from third parties. Enable only if
# strictly required, and only for the specific callback path.
#
# Place at: /etc/nginx/sites-available/dodo-ai-service.conf
# Enable (only if you need public webhook ingress):
#   ln -sf ../sites-available/dodo-ai-service.conf /etc/nginx/sites-enabled/

# --- OPTIONAL: public sub-path under dodo.js-store.com.tw ------------------
# To enable: copy this `location` block into dodo-backend.conf inside the
# HTTPS server { } and reload nginx. Do NOT just enable this whole file
# because it would conflict with the dodo.js-store.com.tw vhost.
#
# location ^~ /ai/ {
#     # Forward to local uvicorn; ai-service strips /ai prefix via FastAPI root_path,
#     # OR rewrite here:
#     rewrite ^/ai/(.*)$ /$1 break;
#
#     proxy_pass http://127.0.0.1:8002;
#     proxy_http_version 1.1;
#     proxy_set_header Host              $host;
#     proxy_set_header X-Real-IP         $remote_addr;
#     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_read_timeout 90s;
#     proxy_send_timeout 90s;
#
#     # SSE for chat streaming
#     proxy_buffering off;
#     proxy_cache off;
#     proxy_set_header Connection '';
#     chunked_transfer_encoding on;
# }

# --- DEFAULT: localhost-only health / debug listener -----------------------
# Bound to 127.0.0.1:8082 so an operator can `curl localhost:8082/healthz`
# without going through the upstream service auth. Useful for cron healthchecks.
server {
    listen 127.0.0.1:8082;
    server_name _;

    access_log /var/log/nginx/dodo-ai-service.access.log;
    error_log  /var/log/nginx/dodo-ai-service.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}
